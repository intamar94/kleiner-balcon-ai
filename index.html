<!DOCTYPE html>
<html>
<head>
  <title>Kleiner Balkon AI</title>
</head>
<body>

<h1>Diseña tu balcón con IA</h1>

<input id="input" placeholder="Ej: balcón pequeño, poco sol, 50€">
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

<script>
async function buscar() {
  const mensaje = document.getElementById("input").value;

  const res = await fetch("/api/recommend", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: mensaje
    })
  });

  const data = await res.json();

document.getElementById("resultado").innerHTML = `
  <div style="margin-top:20px;padding:20px;border:1px solid #ddd;border-radius:12px;max-width:420px;background:#fafafa;">
    
    <h3 style="margin-bottom:10px;">🌿 Recomendación</h3>

    <p style="margin-bottom:10px;">
      ${data.recommendation}
    </p>

    <p style="font-weight:bold; font-size:18px;">
      Desde 29,99€
    </p>

    <ul style="font-size:14px; margin-top:10px; line-height:1.6;">
      <li>✔ Ideal para balcones pequeños</li>
      <li>✔ Fácil de montar</li>
      <li>✔ Todo incluido</li>
    </ul>

    <button style="margin-top:15px;padding:12px 18px;background:black;color:white;border:none;border-radius:8px;cursor:pointer;">
      Ver set
    </button>

  </div>
`;
}
</script>

</body>
</html>
