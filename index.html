<!DOCTYPE html>
<html>
<head>
  <title>Kleiner Balkon AI</title>
</head>
<body>

<h1>Diseña tu balcón con IA</h1>

<input id="input" placeholder="Ej: balcón pequeño, poco sol, 50€">
<button onclick="buscar()">Buscar</button>

<pre id="resultado"></pre>

<script>
async function buscar() {
  const mensaje = document.getElementById("input").value;

  const res = await fetch("/api/recommend", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: mensaje
    })
  });

  const data = await res.json();

  document.getElementById("resultado").innerHTML = `
  <div style="margin-top:20px;padding:15px;border:1px solid #ccc;border-radius:10px;max-width:400px;">
    <h3>Recomendación</h3>
    <p>${data.recommendation}</p>
    <button style="margin-top:10px;padding:10px 15px;background:black;color:white;border:none;border-radius:5px;">
      Ver set
    </button>
  </div>
`;
}
</script>

</body>
</html>
